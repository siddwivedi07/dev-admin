name: DAMS Selenium Automation CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test class to run (leave blank to run all)'
        required: false
        default: 'all'
        type: string
      browser:
        description: 'Browser'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
      environment:
        description: 'Test Environment'
        required: false
        default: 'QA'
        type: choice
        options:
          - QA
          - STAGING
          - PROD

env:
  TEST_ENV: ${{ inputs.environment || 'QA' }}
  BROWSER:  ${{ inputs.browser  || 'chrome' }}

jobs:
  automation-tests:
    name: Run DAMS Admin Panel Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Google Chrome (stable)
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Build & Resolve Dependencies
        run: mvn clean compile -B

      - name: Execute Selenium Tests
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_OTP:      ${{ secrets.ADMIN_OTP }}
          BASE_URL:       ${{ secrets.BASE_URL }}
        run: |
          BASE_CMD="mvn test -B \
            -Dsurefire.rerunFailingTestsCount=2 \
            -Dbrowser=$BROWSER \
            -Denv=$TEST_ENV \
            -DfailIfNoTests=false"

          if [ "${{ inputs.test_scope }}" == "all" ] || [ -z "${{ inputs.test_scope }}" ]; then
            eval "$BASE_CMD"
          else
            eval "$BASE_CMD -Dtest=${{ inputs.test_scope }}"
          fi

      # ── Upload custom pixel-perfect HTML report ──────────────────────────
      - name: Upload DAMS Custom HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAMS-Custom-Report-${{ github.run_number }}
          path: target/Custom-Reports/
          retention-days: 30

      # ── Upload Extent (Spark) report + screenshots ────────────────────────
      - name: Upload Extent Spark Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAMS-Extent-Report-${{ github.run_number }}
          path: target/Extent-Reports/
          retention-days: 30

      # ── Upload raw Surefire XML (optional, useful for test trend plugins) ─
      - name: Upload Surefire XML Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Surefire-XML-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 14
