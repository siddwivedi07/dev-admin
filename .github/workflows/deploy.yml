name: DAMS Selenium CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test class (blank = all)'
        default: 'all'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_OTP:      ${{ secrets.ADMIN_OTP }}
      BASE_URL:       ${{ secrets.BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - run: mvn clean test -B -DfailIfNoTests=false -Dsurefire.rerunFailingTestsCount=2

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAMS-Reports-${{ github.run_number }}
          path: |
            target/Custom-Reports/
            target/Extent-Reports/
            target/surefire-reports/
          retention-days: 30
